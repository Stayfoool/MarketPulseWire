name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Compile scripts
        run: python -m py_compile scripts/*.py

      - name: Check shell scripts
        run: bash -n scripts/*.sh

      - name: Run tests
        run: |
          python scripts/test_analysis.py
          python scripts/test_llm_analysis.py
          python scripts/test_trendforce_page_monitor.py
          python scripts/test_alphabstract_monitor.py
          python scripts/test_trade_policy_monitor.py
          python scripts/test_trade_friction.py
          python scripts/test_link_enrichment.py
          python scripts/test_sina_stock_news.py
          python scripts/test_china_finance_media_monitor.py
          python scripts/test_collector_shadow_digest.py
          python scripts/test_collector_runtime.py
          python scripts/test_news_collector.py
          python scripts/test_official_collector.py
          python scripts/test_research_collector.py
          python scripts/test_value_directory_monitor.py
          python scripts/test_value_directory_flow.py
          python scripts/test_ocr_runtime.py
          python scripts/test_http_utils.py
          python scripts/test_rss_monitor_fetch.py
          python scripts/test_push_rules.py
          python scripts/test_investment_bank_theme_config.py
          python scripts/test_international_bank_fed.py
          python scripts/test_rule_alert_dedup.py
          python scripts/test_macro_event_dedup.py
          python scripts/test_industry_fact_dedup.py
          python scripts/test_company_event_dedup.py
          python scripts/test_ai_compute_supply_demand.py
          python scripts/test_rule_center.py
          python scripts/test_gate_prompts.py
          python scripts/test_content_flow.py
          python scripts/test_architecture_invariants.py
          python scripts/test_event_runtime.py
          python scripts/test_cninfo_disclosure_provider.py
          python scripts/test_company_disclosures.py
          python scripts/test_event_pipeline_convergence.py
          python scripts/test_market_item.py
          python scripts/test_decision_engine.py
          python scripts/test_attributed_research.py
          python scripts/test_market_flow.py
          python scripts/test_market_flow_adapters.py
          python scripts/test_market_review_store.py
          python scripts/test_market_delivery.py
          python scripts/test_sina_zy_client.py
          python scripts/test_industry_hardline.py
          python scripts/test_ai_credit_risk.py
          python scripts/test_macro_policy.py
          python scripts/test_holdings_web.py
          python scripts/test_time_utils.py
          python scripts/test_x_stream_health.py
          python scripts/test_jygs_actions.py
          python scripts/test_skeptic_evaluator.py
          python scripts/test_web_evidence.py
          python scripts/test_signals_extract.py
          python scripts/test_thin_push_cards.py
          python scripts/test_wallstreetcn_monitor.py

      - name: Secret pattern scan
        run: python scripts/scan_secrets.py
